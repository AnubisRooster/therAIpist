name: Therapist
options:
  bundleIdPrefix: com.therAIpist
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  LLM:
    url: https://github.com/eastriverlee/LLM.swift
    exactVersion: "1.8.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Therapist:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    info:
      path: Therapist/Resources/Info.plist
      properties:
        NSMicrophoneUsageDescription: "therAIpist uses the microphone for hands-free voice conversations, so you can speak with the therapist and hear spoken replies."
        NSSpeechRecognitionUsageDescription: "therAIpist transcribes your speech (on-device when supported) so you can talk through your thoughts instead of typing."
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    sources:
      - path: Therapist
        excludes:
          - "Resources/AppIcon.png"
    resources:
      - path: Therapist/Resources/Graph
        buildPhase: resources
    dependencies:
      - package: LLM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.therAIpist.app
        INFOPLIST_FILE: Therapist/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES

  TherapistTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TherapistTests
    dependencies:
      - target: Therapist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.therAIpist.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Therapist.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Therapist"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Therapist:
    build:
      targets:
        Therapist: all
        TherapistTests: [test]
    test:
      targets:
        - TherapistTests
      gatherCoverageData: true
